[package]
name = "bear_cove"
version = "0.1.0"
edition = "2024"

[dependencies]
serenity = "0.12"
tokio = { version = "1.21.2", features = ["macros", "rt-multi-thread"] }
thiserror = "2.0.17"
const_format = "0.2.35"
serde_json = "1.0.145"
serde = { version = "1.0.228", features = ["derive"] }
songbird = "0.5.0"
tracing = "0.1.41"
tracing-subscriber = "0.3.20"
reqwest = "0.12.24"
ordered-float = { version = "5.1.0", features = ["serde"] }
